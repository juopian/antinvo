<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Antinvo RPA</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .session-card.persistent {
      border: 2px solid #ffc107;
    }
    .persistent-indicator {
      position: absolute;
      top: 5px;
      left: 5px;
      background-color: #ffc107;
      color: #333;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="toolbar" style="display: flex; align-items: center;">
    <button class="primary" onclick="create(false)">✨ 新建浏览器</button>
    <button class="primary" onclick="create(true)" style="margin-left: 10px;">🌟 新建持久化浏览器</button>
    <button id="dslBtn" onclick="openDslModal()" style="margin-left: 10px; display: none;">⚙️ DSL 管理</button>
    <button id="batchDslBtn" onclick="openBatchDslModal()" style="margin-left: 10px; display: none;">📦 批量 DSL 管理</button>
    <button id="cronBtn" onclick="openCronModal()" style="margin-left: 10px; display: none;">⏱️ 定时任务</button>
    <button id="secretsBtn" onclick="openSecretsModal()" style="margin-left: 10px; display: none;">🔑 密码保险箱</button>
    <div
      style="flex: 1;font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center;">
      <span>浏览器总数: <span id="totalCount">0</span></span>
      <span style="margin: 0 10px; color: #ccc;">|</span>
      <span>运行中: <span id="runningCount" style="color: orange;">0</span></span>
    </div>
    <div class="layout-switcher" style="margin-right: 16px; display: flex; align-items: center; gap: 5px; font-size: 14px;">
      <button onclick="changeColumns(2, this)">2列</button>
      <button onclick="changeColumns(3, this)">3列</button>
      <button class="active" onclick="changeColumns(5, this)">5列</button>
    </div>
    <div id="userMenu" style="margin-right: 16px; display: flex; align-items: center; gap: 10px;">
      <button id="loginBtn" onclick="window.location.href='/login'" style="padding: 4px 12px;">登陆</button>
    </div>
  </div>

  <div id="list"></div>

  <!-- DSL 模态框 -->
  <div class="modal-overlay" id="dslModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ DSL 脚本管理</h2>
        <button class="close-modal" onclick="closeDslModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="dsl-sidebar">
          <button class="btn-new" onclick="createNewDsl()">➕ 新建脚本</button>
          <div id="dslList"></div>
        </div>
        <div class="dsl-main">
          <input type="hidden" id="editDslId" value="0">
          <input type="text" id="editDslName" placeholder="输入 DSL 脚本名称">
          <div id="editDslContent"
            style="flex: 1; min-height: 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; margin: 10px 0;">
          </div>
          <div class="dsl-actions">
            <button class="btn-format" onclick="formatJson()">✨ 格式化</button>
            <button class="btn-del" id="btnDelDsl" onclick="deleteCurrentDsl()" style="display:none;">删除</button>
            <button class="btn-save" onclick="saveCurrentDsl()">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 定时任务 模态框 -->
  <div class="modal-overlay" id="cronModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>⏱️ 定时任务管理</h2>
        <button class="close-modal" onclick="closeCronModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="dsl-sidebar">
          <button class="btn-new" onclick="createNewCron()">➕ 新建任务</button>
          <div id="cronList"></div>
        </div>
        <div class="dsl-main">
          <input type="hidden" id="editCronId" value="0">
          <input type="text" id="editCronName" placeholder="任务名称"
            style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
          <input type="text" id="editCronSchedule" placeholder="时间间隔 (例如: 10s, 5m, 1h)"
            style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
          <select id="editCronDslId" style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
            <option value="0">-- 选择要执行的 DSL 脚本 --</option>
          </select>
          <div class="dsl-actions">
            <button class="btn-format" id="btnToggleCron" onclick="toggleCurrentCron()"
              style="display:none; margin-right:auto;">▶ 启动任务</button>
            <button class="btn-del" id="btnDelCron" onclick="deleteCurrentCron()" style="display:none;">删除</button>
            <button class="btn-save" onclick="saveCurrentCron()">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 密码保险箱 模态框 -->
  <div class="modal-overlay" id="secretsModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔑 密码保险箱</h2>
        <button class="close-modal" onclick="closeSecretsModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="dsl-sidebar">
          <button class="btn-new" onclick="createNewSecret()">➕ 新建密码</button>
          <div id="secretsList"></div>
        </div>
        <div class="dsl-main">
          <input type="hidden" id="editSecretNameHidden" value="">
          <input type="text" id="editSecretName" placeholder="密码名称 (Key)" style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
          <input type="text" id="editSecretDescription" placeholder="说明 (可选)" style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
          <input type="password" id="editSecretValue" placeholder="密码值 (Value)" style="margin-bottom: 10px; width: 100%; box-sizing: border-box; padding: 8px;">
          <div class="dsl-actions">
            <button class="btn-del" id="btnDelSecret" onclick="deleteCurrentSecret()" style="display:none;">删除</button>
            <button class="btn-save" onclick="saveCurrentSecret()">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 批量DSL管理 模态框 -->
  <div class="modal-overlay" id="batchDslModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📦 批量 DSL 管理</h2>
        <button class="close-modal" onclick="closeBatchDslModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="dsl-sidebar">
          <button class="btn-new" onclick="createNewBatchDsl()">➕ 新建批量脚本</button>
          <div id="batchDslList"></div>
        </div>
        <div class="dsl-main">
          <input type="hidden" id="editBatchDslId" value="0">
          <input type="text" id="editBatchDslName" placeholder="输入批量 DSL 脚本名称">

          <div class="batch-dsl-create"
            style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-top: 10px; background: #f9f9f9;">
            <h4 style="margin-top:0; margin-bottom: 5px; font-size: 14px;">通过模板生成</h4>
            <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
              <label for="batchDslTemplateSelect" style="white-space: nowrap;">DSL 模板:</label>
              <select id="batchDslTemplateSelect" style="flex: 1; padding: 8px;">
                <option value="">-- 请选择 DSL 模板 --</option>
              </select>
            </div>
            <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
              <label for="batchDslDataFileInput" style="white-space: nowrap;">数据文件:</label>
              <input type="file" id="batchDslDataFileInput" accept=".csv,.xlsx,.xls" style="flex: 1;">
              <button class="primary" onclick="generateDslFromTemplate()">🚀 生成内容</button>
            </div>
          </div>
          <div id="batchDslPreviewEditor"
            style="flex: 1; min-height: 0; width: 100%; border: 1px solid #ccc; border-radius: 4px; margin: 10px 0;">
          </div>
          <div class="dsl-actions">
            <button class="btn-format" onclick="formatBatchDslJson()">✨ 格式化</button>
            <button class="btn-del" id="btnDelBatchDsl" onclick="deleteCurrentBatchDsl()" style="display:none;">删除</button>
            <button class="btn-save" onclick="saveCurrentBatchDsl()">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 引入 Ace Editor 以提供良好的 JSON 编辑体验 -->
  <script src="xlsx.full.min.js"></script>
  <script src="ace.js"></script>
  <script src="utils.js"></script>
  <script src="dsl.js"></script>
  <script src="cron.js"></script>
  <script src="secrets.js"></script>
  <script src="dsl_bulk.js"></script>
  <script src="layout.js"></script>
  <script src="session.js"></script>
  <script src="main.js"></script>

</body>

</html>
